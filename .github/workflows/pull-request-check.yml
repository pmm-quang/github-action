name: Pull Request Check

on:
  pull_request:

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:

  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Compile project
        run: ./gradlew clean compileJava

  checkstyle:
    runs-on: ubuntu-latest
    needs: [compile]
    timeout-minutes: 25
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run Checkstyle
        run: ./gradlew --continue checkstyleMain
        continue-on-error: true

      - name: Reviewdog (Checkstyle) – chỉ code thay đổi
        run: |
          if [ -f build/reports/checkstyle/main.xml ]; then
            reviewdog -name="checkstyle" -f=checkstyle -reporter=github-check -filter-mode=added -fail-level=error < build/reports/checkstyle/main.xml
          fi

  pmd:
    runs-on: ubuntu-latest
    needs: [compile]
    timeout-minutes: 25
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run PMD
        run: ./gradlew --continue pmdMain
        continue-on-error: true

      - name: Reviewdog (PMD) – chỉ code thay đổi
        run: |
          if [ -f build/reports/pmd/main.xml ]; then
            reviewdog -name="pmd" -f=pmd -reporter=github-check -filter-mode=added -fail-level=error < build/reports/pmd/main.xml
          fi

  test:
    runs-on: ubuntu-latest
    needs: [compile]
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew clean test

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/test/*.xml"